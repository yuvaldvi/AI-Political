<style>
  :root {
    --bg: #faf9f7;
    --bg-2: #f5f2ed;
    --ink: #1a1a1a;
    --ink-soft: #3d3d3a;
    --ink-mid: #6b6560;
    --ink-light: #9e9890;
    --rule: #e8e5e0;
    --rule-soft: #f0ede8;
    --accent: #c8432b;
    --accent-glow: #e05a3f;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'DM Sans', -apple-system, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent); color: #fff; }
  a { color: inherit; }

  /* App-level chrome */
  .stage {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(200,67,43,.05), transparent 60%),
      var(--bg);
  }

  /* Mobile frame wrapper */
  .mobile-stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(200,67,43,.06), transparent 60%),
      #efece6;
  }
  .mobile-stage .frame-host { width: 390px; max-width: 100%; }

  /* Hide scrollbar inside iOS frame for cleanliness */
  .ios-scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* Mirror circuit pulse — pulses a tiny dash along each trace */
  @keyframes mirror-flow {
    0%   { stroke-dashoffset: 0;    opacity: 0; }
    8%   { opacity: 1; }
    50%  { opacity: 1; }
    92%  { opacity: 0; }
    100% { stroke-dashoffset: -206; opacity: 0; }
  }
  /* Power-chip trace pulse — runs UP from chip into mirror */
  @keyframes chip-pulse {
    0%   { stroke-dashoffset: 0;    opacity: 0; }
    10%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { stroke-dashoffset: -208; opacity: 0; }
  }
  @keyframes chip-led {
    0%, 100% { opacity: .4; }
    50%      { opacity: 1; }
  }
  /* Used by Mirror direction's typewriter */
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- Mobile responsiveness ---- */
  /* Container queries on the .stage / .ios-scroll, so the layout reacts to its
     container's width — works for both real phones AND the in-page iOS preview,
     where the viewport is desktop-sized but the frame is 390px. */
  .stage, .ios-scroll { container-type: inline-size; container-name: app; }

  @container app (max-width: 820px) {
    [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    section { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
    .stage section, .ios-scroll section { gap: 2.2rem !important; }
    nav .nav-links a:not(.nav-cta) { display: none !important; }
    nav .nav-meta { display: none !important; }
    .wordmark-hero { font-size: clamp(1.8rem, 8.4cqw, 3rem) !important; }
    .hero-h1 { font-size: clamp(1.5rem, 6.6cqw, 2.4rem) !important; }
    .mirror-wrap { max-width: min(78cqw, 340px) !important; }
    /* Hero sections shouldn't try to be 88vh on a phone — let content height drive */
    .stage section[style*="minHeight"], .ios-scroll section[style*="minHeight"],
    .stage section[style*="min-height"], .ios-scroll section[style*="min-height"] {
      min-height: 0 !important;
    }
  }
  @container app (max-width: 480px) {
    section { padding-left: 1rem !important; padding-right: 1rem !important; }
    .mirror-wrap { max-width: min(74cqw, 280px) !important; }
    .wordmark-hero { font-size: clamp(1.5rem, 9.2cqw, 2.4rem) !important; }
    .hero-h1 { font-size: clamp(1.4rem, 7cqw, 2rem) !important; }
  }

  /* Fallback for browsers without container query support: still use viewport */
  @media (max-width: 820px) {
    [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    section { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
  }
</style>
</head>

  manifesto: '\u201CThe human understanding is like a false mirror, which, receiving rays irregularly, distorts and discolors the nature of things by mingling its own nature with it.\u201D',

// Small "AI" processor chip + tight PCB traces. Sits directly under the
// mirror; all traces land along the mirror's bottom rim — no dangling
// off-side connections. Smaller, quieter than before.
function MirrorPowerChip({ width = 220 }) {
  // viewBox: 240 wide x 120 tall. Chip body sits at the bottom-center.
  const chip = { x: 95, y: 70, w: 50, h: 38 };
  const cx = chip.x + chip.w / 2; // 120
  // 6 top pins, evenly spaced along chip top edge
  const topPinXs = [102, 110, 118, 122, 130, 138];
  // All landing pads sit along the mirror's bottom rim (y=4),
  // grouped centrally so they look like a real cable bundle into the mirror.
  const landXs = [70, 90, 110, 130, 150, 170];
  const traces = topPinXs.map((px, i) => {
    const lx = landXs[i];
    const bendY = 38 - (i % 3) * 6; // 38, 32, 26 — small staggered bend
    return `M ${px} 70 L ${px} ${bendY} L ${lx} ${bendY} L ${lx} 4`;
  });
  return (
    <div style={{
      width: '100%', maxWidth: width, margin: '0 auto',
      position: 'relative', pointerEvents: 'none',
    }} aria-hidden="true">
      <svg viewBox="0 0 240 120" style={{ width: '100%', height: 'auto', display: 'block' }}>
        <defs>
          <filter id="chip-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="0.9" result="b" />
            <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
          </filter>
          <linearGradient id="chip-body" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%"  stopColor="#9a8f80" />
            <stop offset="45%" stopColor="#6b6258" />
            <stop offset="100%" stopColor="#3d3731" />
          </linearGradient>
          <linearGradient id="chip-pin" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"  stopColor="#d8d4cc" />
            <stop offset="50%" stopColor="#a8a39a" />
            <stop offset="100%" stopColor="#5e574e" />
          </linearGradient>
        </defs>

        {/* Static PCB traces */}
        <g stroke="var(--ink-light)" strokeWidth="0.6" fill="none" opacity="0.55"
           strokeLinecap="round" strokeLinejoin="round">
          {traces.map((d, i) => <path key={i} d={d} />)}
        </g>
        {/* Solder pads at the mirror rim */}
        <g fill="var(--ink-mid)" opacity="0.8">
          {landXs.map((x, i) => <circle key={i} cx={x} cy="4" r="1.6" />)}
        </g>
        {/* Live accent pulse running up each trace */}
        <g stroke="var(--accent)" strokeWidth="1" fill="none"
           strokeLinecap="round" strokeLinejoin="round" filter="url(#chip-glow)">
          {traces.map((d, i) => (
            <path
              key={i}
              d={d}
              strokeDasharray="6 200"
              style={{
                animation: `chip-pulse ${2.8 + (i % 3) * 0.4}s linear ${i * 0.18}s infinite`,
              }}
            />
          ))}
        </g>

        {/* Pins on all four sides */}
        <g>
          {topPinXs.map((px, i) => (
            <rect key={`t${i}`} x={px - 1.5} y="66" width="3" height="5" rx="0.6"
                  fill="url(#chip-pin)" stroke="#1a1815" strokeWidth="0.3" />
          ))}
          {topPinXs.map((px, i) => (
            <rect key={`b${i}`} x={px - 1.5} y="108" width="3" height="5" rx="0.6"
                  fill="url(#chip-pin)" stroke="#1a1815" strokeWidth="0.3" />
          ))}
          {[74, 82, 90, 98].map((py, i) => (
            <rect key={`l${i}`} x="90" y={py} width="5" height="3" rx="0.6"
                  fill="url(#chip-pin)" stroke="#1a1815" strokeWidth="0.3" />
          ))}
          {[74, 82, 90, 98].map((py, i) => (
            <rect key={`r${i}`} x="145" y={py} width="5" height="3" rx="0.6"
                  fill="url(#chip-pin)" stroke="#1a1815" strokeWidth="0.3" />
          ))}
        </g>

        {/* Square processor body */}
        <rect x={chip.x} y={chip.y} width={chip.w} height={chip.h} rx="2"
              fill="url(#chip-body)" stroke="#000" strokeWidth="0.5" />
        <rect x={chip.x + 0.6} y={chip.y + 0.6} width={chip.w - 1.2} height="1.2"
              fill="rgba(255,255,255,.35)" />
        <rect x={chip.x + 5} y={chip.y + 5} width={chip.w - 10} height={chip.h - 10}
              rx="0.6" fill="none" stroke="rgba(255,255,255,.25)" strokeWidth="0.4" />
        {/* Faint die grid — suggests transistor pattern on the silicon */}
        <g stroke="rgba(255,255,255,.18)" strokeWidth="0.25">
          {[0,1,2,3,4].map(i => (
            <line key={`gh${i}`}
                  x1={chip.x + 7}
                  x2={chip.x + chip.w - 7}
                  y1={chip.y + 8 + i * (chip.h - 16) / 4}
                  y2={chip.y + 8 + i * (chip.h - 16) / 4} />
          ))}
          {[0,1,2,3,4,5].map(i => (
            <line key={`gv${i}`}
                  y1={chip.y + 7}
                  y2={chip.y + chip.h - 7}
                  x1={chip.x + 7 + i * (chip.w - 14) / 5}
                  x2={chip.x + 7 + i * (chip.w - 14) / 5} />
          ))}
        </g>
        <circle cx={chip.x + 4} cy={chip.y + 4} r="1.2" fill="#1a1612"
                stroke="rgba(255,255,255,.4)" strokeWidth="0.3" />

        {/* Status LED — only ornament left on the die */}
        <circle cx={chip.x + chip.w - 5} cy={chip.y + chip.h - 5} r="1.1"
                fill="var(--accent)"
                style={{ animation: 'chip-led 1.6s ease-in-out infinite' }} />
        <circle cx={chip.x + chip.w - 5} cy={chip.y + chip.h - 5} r="2.3"
                fill="var(--accent)" opacity="0.18"
                style={{ animation: 'chip-led 1.6s ease-in-out infinite' }} />
      </svg>
    </div>
  );
}

function MrAsk() {
  const queries = [
    { q: 'Where can this team move fastest with confidence?', a: 'Right here — three adjacent decisions where the evidence is already aligned and only consensus is missing.' },

  const [i, setI] = React.useState(0);

    setTyped('');

  return (
    <section id="ask" style={{

        <h2 style={{
          fontFamily: 'var(--serif)', fontWeight: 400,
          fontSize: 'clamp(1.8rem, 3vw, 2.6rem)',

    { t: '> matching evidence found', c: 'dim' },
    { t: '! supporting findings:', c: 'accent' },
    { t: '  - clearer decisions at scale', c: 'ink' },
    { t: '  - less work spent on politics', c: 'ink' },
    { t: '> evidence: ch.3, ch.7, ch.12', c: 'dim' },
    { t: '> status: SUPPORTED', c: 'green' },
    { t: '', c: 'dim' },
    { t: '$ ask --topic "the_real_opportunity"', c: 'cmd' },
    { t: '> for the first time, we can build', c: 'ink' },
    { t: '  systems whose default is honesty —', c: 'ink' },
    { t: '  and whose scale is the planet.', c: 'ink' },
    { t: '> status: ON THE RECORD', c: 'green' },
  ];

  const [shown, setShown] = React.useState(0);
  React.useEffect(() => {
    if (shown >= lines.length) {
      const r = setTimeout(() => setShown(0), 4500);
      return () => clearTimeout(r);
    }
    const t = setTimeout(() => setShown(shown + 1), shown === 0 ? 200 : 280);
    return () => clearTimeout(t);
  }, [shown]);

  const colorOf = c => ({
    cmd: '#fff',
    dim: 'rgba(255,255,255,.45)',
    ink: 'rgba(255,255,255,.92)',
    accent: 'var(--accent)',
    green: '#7fd49b',
  }[c] || '#fff');

  return (
    <div style={{
      background: '#0f0f0f',
      border: '1px solid #2a2a2a',
      borderRadius: 6,
      overflow: 'hidden',
      boxShadow: '0 30px 60px rgba(0,0,0,.25)',

        padding: '.6rem 1rem',

        lineHeight: 1.7, minHeight: 360,
      }}>
        {lines.slice(0, shown).map((l, i) => (
          <div key={i} style={{ color: colorOf(l.c) }}>
            {l.t || '\u00a0'}
          </div>
        ))}
        {shown < lines.length && (

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel"
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">{children}</div>
      </div>
    </>
  );
}

// ── Layout helpers ──────────────────────────────────────────────────────────

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}

  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function TweakColor({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <input type="color" className="twk-swatch" value={value}
             onChange={(e) => onChange(e.target.value)} />
    </div>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

</script>
<script type="text/babel" data-presets="env,react">
// app.jsx — top-level: tweaks panel, direction switcher, mobile preview

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "direction": "editorial",
  "accent": "#c8432b",
  "density": "regular",
  "mobile": false
}/*EDITMODE-END*/;

const ACCENTS = {
  red:    '#c8432b',
  amber:  '#c97a2b',
  cyan:   '#2b8cc8',
  ink:    '#1a1a1a',
};

function App() {
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const directionEl = (
    t.direction === 'mirror'  ? <MirrorDirection density={t.density} accent={t.accent} /> :
    t.direction === 'ledger'  ? <LedgerDirection density={t.density} accent={t.accent} /> :
                                <EditorialDirection density={t.density} accent={t.accent} />
  );

  return (
    <>
      {t.mobile ? (
        <div className="mobile-stage">
          <div className="frame-host">
            <IOSDevice width={390} height={780}>
              <div className="ios-scroll" style={{ height: '100%', overflow: 'auto', background: '#faf9f7' }}>
                {directionEl}
              </div>
            </IOSDevice>
          </div>
        </div>
      ) : (
        <div className="stage">{directionEl}</div>
      )}

      <TweaksPanel title="Tweaks">
        <TweakSection label="Direction" />
        <TweakRadio
          label="Variant"
          value={t.direction}
          options={['editorial', 'mirror', 'ledger']}
          onChange={v => setTweak('direction', v)}
        />

        <TweakSection label="Style" />
        <TweakSelect
          label="Accent"
          value={t.accent}
          options={[
            { label: 'Book red', value: ACCENTS.red },
            { label: 'Amber',    value: ACCENTS.amber },
            { label: 'Cyan',     value: ACCENTS.cyan },
            { label: 'Ink',      value: ACCENTS.ink },
          ]}
          onChange={v => setTweak('accent', v)}
        />
        <TweakRadio
          label="Density"
          value={t.density}
          options={['compact', 'regular', 'comfy']}
          onChange={v => setTweak('density', v)}
        />

        <TweakSection label="Preview" />
        <TweakToggle
          label="Mobile (iPhone)"
          value={t.mobile}
          onChange={v => setTweak('mobile', v)}
        />
      </TweaksPanel>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

</script>
