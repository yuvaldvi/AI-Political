<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AI-Political — Redesign Explorations</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  :root {
    --bg: #faf9f7;
    --bg-2: #f5f2ed;
    --ink: #1a1a1a;
    --ink-soft: #3d3d3a;
    --ink-mid: #6b6560;
    --ink-light: #9e9890;
    --rule: #e8e5e0;
    --rule-soft: #f0ede8;
    --accent: #c8432b;
    --accent-glow: #e05a3f;
    --serif: 'Instrument Serif', Georgia, serif;
    --sans: 'DM Sans', -apple-system, system-ui, sans-serif;
    --mono: 'JetBrains Mono', ui-monospace, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  ::selection { background: var(--accent); color: #fff; }
  a { color: inherit; }

  /* App-level chrome */
  .stage {
    min-height: 100vh;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(200,67,43,.05), transparent 60%),
      var(--bg);
  }

  /* Mobile frame wrapper */
  .mobile-stage {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
    background:
      radial-gradient(900px 500px at 50% -10%, rgba(200,67,43,.06), transparent 60%),
      #efece6;
  }
  .mobile-stage .frame-host { width: 390px; max-width: 100%; }

  /* Hide scrollbar inside iOS frame for cleanliness */
  .ios-scroll::-webkit-scrollbar { width: 0; height: 0; }

  /* Mirror circuit pulse — pulses a tiny dash along each trace */
  @keyframes mirror-flow {
    0%   { stroke-dashoffset: 0;    opacity: 0; }
    8%   { opacity: 1; }
    50%  { opacity: 1; }
    92%  { opacity: 0; }
    100% { stroke-dashoffset: -206; opacity: 0; }
  }
  /* Power-chip trace pulse — runs UP from chip into mirror */
  @keyframes chip-pulse {
    0%   { stroke-dashoffset: 0;    opacity: 0; }
    10%  { opacity: 1; }
    85%  { opacity: 1; }
    100% { stroke-dashoffset: -208; opacity: 0; }
  }
  @keyframes chip-led {
    0%, 100% { opacity: .4; }
    50%      { opacity: 1; }
  }
  /* Used by Mirror direction's typewriter */
  @keyframes blink { 50% { opacity: 0; } }

  /* ---- Mobile responsiveness ---- */
  /* Container queries on the .stage / .ios-scroll, so the layout reacts to its
     container's width — works for both real phones AND the in-page iOS preview,
     where the viewport is desktop-sized but the frame is 390px. */
  .stage, .ios-scroll { container-type: inline-size; container-name: app; }

  @container app (max-width: 820px) {
    [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    section { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
    .stage section, .ios-scroll section { gap: 2.2rem !important; }
    nav .nav-links a:not(.nav-cta) { display: none !important; }
    nav .nav-meta { display: none !important; }
    .wordmark-hero { font-size: clamp(1.8rem, 8.4cqw, 3rem) !important; }
    .hero-h1 { font-size: clamp(1.5rem, 6.6cqw, 2.4rem) !important; }
    .mirror-wrap { max-width: min(78cqw, 340px) !important; }
    /* Hero sections shouldn't try to be 88vh on a phone — let content height drive */
    .stage section[style*="minHeight"], .ios-scroll section[style*="minHeight"],
    .stage section[style*="min-height"], .ios-scroll section[style*="min-height"] {
      min-height: 0 !important;
    }
  }
  @container app (max-width: 480px) {
    section { padding-left: 1rem !important; padding-right: 1rem !important; }
    .mirror-wrap { max-width: min(74cqw, 280px) !important; }
    .wordmark-hero { font-size: clamp(1.5rem, 9.2cqw, 2.4rem) !important; }
    .hero-h1 { font-size: clamp(1.4rem, 7cqw, 2rem) !important; }
  }

  /* Fallback for browsers without container query support: still use viewport */
  @media (max-width: 820px) {
    [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    section { padding-left: 1.25rem !important; padding-right: 1.25rem !important; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel" src="components/shared.jsx"></script>
<script type="text/babel" src="components/editorial.jsx"></script>
<script type="text/babel" src="components/mirror.jsx"></script>
<script type="text/babel" src="components/ledger.jsx"></script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

</body>
</html>
